<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECH — Change Password</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#388bfd;--yellow:#d29922;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;align-items:center;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px;text-align:center}
.logo{font-family:var(--mono);font-size:24px;color:var(--green);margin-bottom:4px;letter-spacing:.08em}
.subtitle{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.05em}
.notice{background:rgba(210,153,34,.1);border:1px solid var(--yellow);border-radius:6px;color:var(--yellow);font-family:var(--mono);font-size:11px;padding:10px 14px;margin-bottom:24px;text-align:left;line-height:1.5}
label{display:block;text-align:left;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px;margin-top:16px}
input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 12px;border-radius:6px;outline:none}
input:focus{border-color:var(--blue)}
.submit-btn{width:100%;margin-top:24px;background:var(--green);border:none;color:#0d1117;font-family:var(--mono);font-size:13px;font-weight:500;padding:10px;border-radius:6px;cursor:pointer;letter-spacing:.04em}
.submit-btn:hover{opacity:.9}
.error{font-family:var(--mono);font-size:11px;color:var(--red);margin-top:12px;padding:8px 10px;background:rgba(248,81,73,.08);border:1px solid var(--red);border-radius:4px;display:none}
.hint{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">▣ ECH</div>
  <div class="subtitle">Emergency Communications Hub</div>
  <div class="notice">&#9888; Password change required before continuing.<br>Choose a strong password (min. 8 characters).</div>
  <form id="pw-form" method="POST" action="/api/auth/change-password">
    <label>New password</label>
    <input type="password" name="new_password" id="new_password" placeholder="new password" autocomplete="new-password" autofocus>
    <label>Confirm password</label>
    <input type="password" name="confirm_password" id="confirm_password" placeholder="confirm password" autocomplete="new-password">
    <button type="submit" class="submit-btn">Set password</button>
  </form>
  <div class="error" id="error-msg"></div>
  <div class="hint">You will be signed out and need to log in with the new password.</div>
</div>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const err = params.get('error');
  const el = document.getElementById('error-msg');
  if (err === 'short')    { el.textContent = 'Password must be at least 8 characters.'; el.style.display = 'block'; }
  if (err === 'mismatch') { el.textContent = 'Passwords do not match.'; el.style.display = 'block'; }
})();
</script>
</body>
</html>
